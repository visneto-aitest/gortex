name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build -o gortex ./cmd/gortex/

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.25'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          args: --timeout=5m

  build-onnx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install ONNX Runtime
        run: |
          wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.24.4/onnxruntime-linux-x64-1.24.4.tgz
          tar xzf onnxruntime-linux-x64-1.24.4.tgz
          sudo cp onnxruntime-linux-x64-1.24.4/lib/libonnxruntime.so* /usr/local/lib/
          sudo ldconfig

      - name: Build with ONNX tag
        run: go build -tags embeddings_onnx -o gortex-onnx ./cmd/gortex/

      - name: Build with Hugot tag
        run: go build -tags embeddings_hugot -o gortex-hugot ./cmd/gortex/

      - name: Build with GoMLX tag
        run: go build -tags embeddings_gomlx -o gortex-gomlx ./cmd/gortex/

  benchmark:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Run benchmarks
        run: go test -bench=. -benchmem -count=1 -benchtime=1s ./internal/parser/languages/ ./internal/query/ ./internal/graph/
