version: 2

# Run inside ghcr.io/goreleaser/goreleaser-cross — the Docker image ships
# cross-compile toolchains for all four targets below so CGO (tree-sitter)
# links cleanly on a single Linux runner. See .github/workflows/release.yml.
before:
  hooks:
    - go mod tidy
    # Tests run in CI on every push. Re-running ./... inside
    # goreleaser-cross slows the tag-to-artifact loop without catching
    # anything new — the tag is already on a green commit.

builds:
  - id: main
    main: ./cmd/gortex/
    binary: gortex
    ldflags:
      # main.version + main.commit get parsed at startup into a SemVer 2.0.0
      # Version (see internal/version). Commit lands in the +build slot so
      # `gortex version` output round-trips as canonical semver.
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}
    env:
      - CGO_ENABLED=1
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Per-target CC + CXX. goreleaser-cross exposes these cross-toolchains
    # on PATH; CGO needs both set per target triple because some deps
    # (tree-sitter yaml scanner, etc.) ship C++. Without CXX, the system
    # default x86_64-linux-gnu-g++ leaks in and rejects macOS flags like
    # -arch.
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CC=o64-clang
          - CXX=o64-clang++
      - goos: darwin
        goarch: arm64
        env:
          - CC=oa64-clang
          - CXX=oa64-clang++
      - goos: linux
        goarch: amd64
        env:
          - CC=x86_64-linux-gnu-gcc
          - CXX=x86_64-linux-gnu-g++
      - goos: linux
        goarch: arm64
        env:
          - CC=aarch64-linux-gnu-gcc
          - CXX=aarch64-linux-gnu-g++

archives:
  - formats: [tar.gz]
    # Version intentionally omitted — `/releases/latest/download/<name>` URLs
    # require an exact filename, and users linking to the latest release
    # shouldn't need to know the version. Version is still in the release
    # tag and in `gortex version`.
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'

nfpms:
  - id: gortex
    # Match the archive naming — version omitted so `/releases/latest/download`
    # URLs work without templating. Package metadata still carries the version.
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    ids:
      - main
    formats:
      - deb
      - rpm
      - apk
    vendor: "zzet"
    homepage: "https://github.com/zzet/gortex"
    maintainer: "zzet"
    description: "Code intelligence engine that indexes repositories into an in-memory knowledge graph."
    license: "Custom"

brews:
  - name: gortex
    # GITHUB_TOKEN can only push to the source repo. Pushing the updated
    # formula to zzet/homebrew-tap needs a PAT with `repo` scope stored as
    # HOMEBREW_TAP_TOKEN in repo secrets. Workflow wires it into the env.
    repository:
      owner: zzet
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/zzet/gortex"
    description: "Code intelligence engine that indexes repositories into an in-memory knowledge graph."
    license: "Custom (PolyForm Small Business base)"
    # Install the binary plus shell completions. generate_completions_from_executable
    # runs `gortex completion bash|zsh|fish` at install time and drops each script
    # into the standard Homebrew completions directory, so `brew install gortex`
    # gives users tab-complete out of the box (no manual `compinit` wiring).
    install: |
      bin.install "gortex"
      generate_completions_from_executable(bin/"gortex", "completion")
    test: |
      system "#{bin}/gortex", "version"
