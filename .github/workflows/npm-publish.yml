name: npm — @gortex/wire

on:
  push:
    tags:
      - "wire-ts-v*"
  pull_request:
    paths:
      - "packages/wire-ts/**"
      - ".github/workflows/npm-publish.yml"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run npm publish --dry-run instead of a real publish"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

defaults:
  run:
    working-directory: packages/wire-ts

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/wire-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  publish:
    name: Publish to npm
    needs: test
    if: startsWith(github.ref, 'refs/tags/wire-ts-v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for --provenance
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"
          cache-dependency-path: packages/wire-ts/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/wire-ts-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#wire-ts-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "tag:    $TAG_VERSION"
          echo "pkg:    $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::tag ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Publish (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm publish --access public --provenance --dry-run

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/wire-ts-v') || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
